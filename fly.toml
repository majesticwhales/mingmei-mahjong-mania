# fly.toml app configuration file generated for mingmei-mahjong-mania on 2026-06-08T21:51:07-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mingmei-mahjong-mania'
primary_region = 'yyz'

[build]

[deploy]
  release_command = 'npm run db:migrate'

[env]
  CLIENT_DIST = '/app/client/dist'
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
